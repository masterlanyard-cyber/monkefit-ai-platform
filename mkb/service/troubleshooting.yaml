id: SERVICE-TROUBLESHOOTING-HUSSAR
version: 1.0.0
status: approved
owner: Monkefit
last_review: 2026-07-13
confidence: 0.92
sources:
  - Hussar300RS user manual
  - R1000 user manual
  - internal_service_team

issues:
  slat_running_belt_shift:
    symptoms:
      - slat_or_running_belt_moves_off_center
      - uneven_running_feel
    safe_first_steps:
      - stop_using_the_machine
      - inspect_belt_position_visually
      - follow_model_specific_manual_adjustment_procedure
      - make_small_and_balanced_adjustments_only
    escalation_conditions:
      - customer_is_not_confident_adjusting
      - belt_does_not_return_to_center
      - unusual_noise_or_component_damage
      - repeated_shift_after_adjustment
  difficult_adjustment:
    response_rule: do_not_force_customer_to_disassemble_main_components
    action: collect_photo_video_product_model_city_and_purchase_data_then_escalate_to_service_admin

safety_rules:
  - never_instruct_customer_to_use_machine_while_belt_is_misaligned
  - never_recommend_major_disassembly
  - complaints_and_damage_claims_require_human_handling
