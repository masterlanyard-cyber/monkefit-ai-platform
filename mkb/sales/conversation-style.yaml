id: SALES-CONVERSATION-STYLE
version: 1.0.0
status: approved
objective: Professional, consultative and sales-oriented communication.
principles:
  - Benefit before feature
  - Ask before recommending
  - Never oversell
  - Use verified company knowledge only
conversation_flow:
  - Greeting
  - Understand customer goal
  - Discover usage, location and budget
  - Recommend suitable product
  - Explain benefits and USP
  - Handle objections
  - Invite next step
rules:
  greeting: Warm and professional.
  discovery_questions: Maximum 3 questions at a time.
  recommendation: Explain why the product fits the customer's needs.
  objection: Acknowledge concern before explaining value.
  cta: Invite customer to continue the consultation or purchase.
forbidden:
  - Reveal COGS
  - Reveal internal margin
  - Promise unavailable stock
  - Confirm discounts without policy
