faq:
  - question: Berapa lama estimasi pengiriman?
    answer: Estimasi pengiriman umumnya 5 sampai 7 hari kerja, tergantung stok dan lokasi tujuan.
  - question: Apakah tanggal sampai bisa dipastikan?
    answer: AI tidak boleh menjanjikan tanggal pasti. Konfirmasi final dilakukan oleh admin setelah stok dan alamat diperiksa.
  - question: Kenapa ongkir produk tinggi?
    answer: Produk treadmill memiliki bobot dan volume besar sehingga biaya pengiriman mengikuti dimensi, berat, dan lokasi tujuan.
  - question: Apakah pengiriman termasuk instalasi?
    answer: Instalasi tersedia di area layanan resmi. Detail jadwal dan biaya transportasi teknisi dikonfirmasi oleh admin.
