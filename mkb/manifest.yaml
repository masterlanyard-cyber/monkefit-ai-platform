id: MONKEFIT-MKB-MANIFEST
version: 1.3.0
status: active
owner: Monkefit
last_review: 2026-07-14
release:
  name: Monkefit AI Core
  version: 1.1.0-alpha1
  sprint: 4

active_layers:
  company:
    - mkb/company/company-card.yaml
  products:
    - mkb/products/hussar300rs.yaml
    - mkb/products/hussar800rs.yaml
    - mkb/products/hussar1000rs.yaml
  pricing:
    - mkb/pricing/payment-policy.yaml
    - mkb/pricing/discount-policy-v1.0.yaml
  service:
    - mkb/service/warranty.yaml
    - mkb/service/installation.yaml
    - mkb/service/troubleshooting.yaml
    - mkb/service/shipping-policy-v1.0.yaml
    - mkb/service/technician-transport-v1.0.yaml
  sales:
    - mkb/sales/objection-brain.yaml
    - mkb/sales/competitors.yaml
    - mkb/sales/closing-brain.yaml
    - mkb/sales/negotiation.yaml
    - mkb/sales/follow-up-engine.yaml
    - mkb/sales/conversation-style-v1.1.yaml
    - mkb/sales/sales-rules-v1.1.yaml
  faq:
    - mkb/faq/product.yaml
    - mkb/faq/service.yaml
    - mkb/faq/payment.yaml
    - mkb/faq/shipping.yaml
  decision_engine:
    - mkb/decision-engine/recommendation.yaml
    - mkb/decision-engine/lead-qualification.yaml
    - mkb/decision-engine/escalation-routing.yaml
  intelligence:
    - mkb/intelligence/conversation-state.yaml
    - mkb/intelligence/conversation-memory.yaml
    - mkb/intelligence/customer-goal.yaml
    - mkb/intelligence/next-best-action.yaml
    - mkb/intelligence/persona-engine.yaml
    - mkb/intelligence/confidence-engine.yaml
    - mkb/intelligence/response-quality.yaml
  consultant:
    - mkb/consultant/package-engine.yaml
    - mkb/consultant/gym-planner.yaml
    - mkb/consultant/investment-planner.yaml
    - mkb/consultant/expansion-planner.yaml
    - mkb/consultant/equipment-selector.yaml
    - mkb/consultant/budget-optimizer.yaml
    - mkb/consultant/gym-capacity-calculator.yaml
    - mkb/consultant/roi-estimator.yaml
    - mkb/consultant/layout-planner.yaml
  ai:
    - mkb/ai/guardrails.yaml
    - mkb/ai/conversation-workflow.yaml
    - mkb/ai/customer-intent.yaml
    - mkb/ai/customer-profile.yaml
    - mkb/ai/lead-score.yaml
    - mkb/ai/master-system-prompt.md
    - mkb/ai/handover-payload.yaml
  learning:
    - mkb/learning/question-miner.yaml
    - mkb/learning/knowledge-gap-detector.yaml
    - mkb/learning/review-workflow.yaml
  uat:
    - mkb/uat/UAT_PLAN.md
    - mkb/uat/TC001-TC030.md
    - mkb/uat/BUG_REPORT.md
    - mkb/uat/RELEASE_CHECKLIST.md

legacy_modules:
  - path: mkb/sales/objection-handling.yaml
    replaced_by: mkb/sales/objection-brain.yaml
  - path: mkb/sales/closing.yaml
    replaced_by: mkb/sales/closing-brain.yaml
  - path: mkb/sales/conversation-style.yaml
    replaced_by: mkb/sales/conversation-style-v1.1.yaml

source_of_truth:
  index: mkb/index.yaml
  manifest: mkb/manifest.yaml

confidentiality:
  prohibited_public_fields:
    - COGS
    - internal_margin
    - internal_profit
    - minimum_approved_selling_price

stock_policy:
  status: pending_live_integration
  response_rule: verify_with_team_before_confirming

learning_policy:
  automatic_production_update: false
  human_review_required: true
  pii_must_be_removed: true
  approved_changes_require_version_and_uat: true

runtime_rules:
  - Load active_layers only.
  - Do not load legacy_modules in production.
  - Active versioned policies take precedence over older unversioned files.
  - Learning candidates never become production knowledge without approval.
  - Consultant engine outputs are estimates and must expose assumptions.
  - Formal quotations and final project commitments require Niken review.
